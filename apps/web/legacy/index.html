  <!-- Components -->
  <script type="text/babel" src="NavBar.jsx"></script>
  <script type="text/babel" src="FilterBar.jsx"></script>
  <script type="text/babel" src="DetailPanel.jsx"></script>
  <script type="text/babel" src="MapPanel.jsx"></script>
  <script type="text/babel" src="AnalyticsPage.jsx"></script>
  <script type="text/babel" src="AddProjectPage.jsx"></script>

  <!-- Main App -->
  <script type="text/babel">
    const { useState, useMemo } = React;

    const App = () => {
      const [activePage, setActivePage]           = useState("map");
      const [selectedProject, setSelectedProject] = useState(null);
      const [activeFilters, setActiveFilters]     = useState([]);
      const [activeProvinces, setActiveProvinces] = useState([]);

      const highlightedIds = useMemo(() => {
        if (!selectedProject) return [];
        return [selectedProject.id, ...(selectedProject.relatedProjects || [])];
      }, [selectedProject]);

      const toggleFilter   = (opt)  => setActiveFilters(prev  => prev.includes(opt)  ? prev.filter(f => f !== opt)  : [...prev, opt]);
      const clearFilters   = ()     => setActiveFilters([]);
      const toggleProvince = (prov) => setActiveProvinces(prev => prev.includes(prov) ? prev.filter(p => p !== prov) : [...prev, prov]);
      const clearProvinces = ()     => setActiveProvinces([]);

      const handleSelectProject = (p) => setSelectedProject(prev => prev?.id === p.id ? null : p);

      const projectCounts = useMemo(() => {
        const visible = MOCK_PROJECTS.filter(p => {
          const urgencyOk  = activeFilters.length === 0  || p.urgencyCategory.some(u => activeFilters.includes(u));
          const provinceOk = activeProvinces.length === 0 || activeProvinces.includes(p.province);
          return urgencyOk && provinceOk;
        });
        return {
          total:        visible.length,
          energized:    visible.filter(p => p.status === "Energized").length,
          construction: visible.filter(p => p.status === "Construction").length,
          preCon:       visible.filter(p => p.status === "Pre-Construction").length,
        };
      }, [activeFilters, activeProvinces]);

      return (
        <div style={appStyles.shell}>
          {/* Top nav — always visible */}
          <NavBar activePage={activePage} onNavigate={setActivePage} />

          {/* Page: Map */}
          {activePage === "map" && (
            <div style={appStyles.mapShell}>
              <FilterBar
                activeFilters={activeFilters}
                onToggle={toggleFilter}
                onClearAll={clearFilters}
                projectCounts={projectCounts}
                activeProvinces={activeProvinces}
                onProvinceToggle={toggleProvince}
                onProvinceClearAll={clearProvinces}
              />
              <div style={appStyles.main}>
                <div style={appStyles.mapArea}>
                  <MapPanel
                    projects={MOCK_PROJECTS}
                    selectedId={selectedProject?.id}
                    highlightedIds={highlightedIds}
                    onSelectProject={handleSelectProject}
                    activeFilters={activeFilters}
                    activeProvinces={activeProvinces}
                  />
                </div>
                <div style={appStyles.detailArea}>
                  <DetailPanel
                    project={selectedProject}
                    allProjects={MOCK_PROJECTS}
                    onSelectProject={handleSelectProject}
                  />
                </div>
              </div>
              <div style={appStyles.statusBar}>
                <span style={appStyles.statusItem}>
                  <span style={{ ...appStyles.statusDot, background: "#10B981" }}></span>
                  System Online
                </span>
                <span style={appStyles.statusItem}>Last updated: 27 April 2026, 08:00 WIB</span>
                <span style={appStyles.statusItem}>
                  {(activeFilters.length > 0 || activeProvinces.length > 0)
                    ? `Filter: ${[...activeProvinces, ...activeFilters].join(" · ")}`
                    : `Menampilkan ${MOCK_PROJECTS.length} proyek · Klik node untuk detail`}
                </span>
                <span style={{ ...appStyles.statusItem, marginLeft: "auto" }}>RUPTL 2024–2033 · PLN Pusat</span>
              </div>
            </div>
          )}

          {/* Page: Analytics */}
          {activePage === "analytics" && <AnalyticsPage />}

          {/* Page: Input */}
          {activePage === "input" && <AddProjectPage />}
        </div>
      );
    };

    const appStyles = {
      shell:    { display:"flex", flexDirection:"column", height:"100vh", width:"100vw", overflow:"hidden", background:"#0B1220" },
      mapShell: { display:"flex", flexDirection:"column", flex:1, overflow:"hidden", minHeight:0 },
      main:     { display:"flex", flex:1, overflow:"hidden", minHeight:0 },
      mapArea:  { flex:1, display:"flex", flexDirection:"column", minWidth:0, overflow:"hidden", borderRight:"1px solid #1F2937" },
      detailArea:{ width:"320px", flexShrink:0, display:"flex", flexDirection:"column", overflow:"hidden", background:"#111827" },
      statusBar:{ display:"flex", alignItems:"center", gap:"20px", padding:"5px 20px", background:"#0D1526", borderTop:"1px solid #1F2937", flexShrink:0 },
      statusItem:{ fontSize:"10px", color:"#4B5563", display:"flex", alignItems:"center", gap:"5px" },
      statusDot: { width:"6px", height:"6px", borderRadius:"50%", animation:"pulse 2s infinite" },
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <style>
    @keyframes pulse { 0%, 100% { opacity:1; } 50% { opacity:0.4; } }
    @keyframes spin   { to { transform:rotate(360deg); } }
  </style>
</body>
</html>
