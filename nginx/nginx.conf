events { worker_connections 1024; }

http {
  include      mime.types;
  default_type application/octet-stream;
  sendfile     on;
  gzip         on;
  gzip_types   text/plain application/json application/javascript text/css text/xml;

  upstream api { server api:3000; }
  upstream web { server web:80;   }

  # ── HTTP — redirect to HTTPS ──────────────────────────────────────────
  server {
    listen 80;
    server_name ruptl.example.com;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }
    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── HTTPS ─────────────────────────────────────────────────────────────
  server {
    listen 443 ssl;
    server_name ruptl.example.com;

    ssl_certificate     /etc/letsencrypt/live/ruptl.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ruptl.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    client_max_body_size 25M;

    # API
    location /api/ {
      proxy_pass         http://api/api/;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    # SPA
    location / {
      proxy_pass         http://web/;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
    }
  }
}
